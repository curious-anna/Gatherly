name: Keep Supabase Alive

on:
  schedule:
    # Run at midnight (0 0 * *) on Monday (1) and Friday(5)
    - cron: '0 0 * * 1,5'    
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase Database
        run: |
          curl -X GET "${{ secrets.SUPABASE_URL }}/rest/v1/poll_options" \
          -H "apikey: ${{ secrets.SUPABASE_KEY }}" \
          -H "Authorization: Bearer ${{ secrets.SUPABASE_KEY }}"
